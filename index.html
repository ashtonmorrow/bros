<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POUNCE // A Cat Platformer</title>

  <meta name="description" content="A free browser side-scroller. Play as a cat — pick from four palettes — bounding through a hand-built tile level on the way to a cozy bed. Stomp bugs, collect treats and yarn balls, and reach the goal. Vanilla HTML / Canvas / Web Audio. No build step.">
  <link rel="canonical" href="https://pounce.mike-lee.me/">
  <meta name="theme-color" content="#1a1a2e">

  <!-- PWA manifest (makes the game installable to home screen) -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pounce">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16"   href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48"   href="/favicon-48.png">
  <link rel="icon" type="image/png" sizes="64x64"   href="/favicon-64.png">
  <link rel="icon" type="image/png" sizes="96x96"   href="/favicon-96.png">
  <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

  <!-- Structured data: VideoGame -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Pounce",
    "alternateName": "pounce",
    "description": "A free browser side-scrolling platformer. Play as a cat trying to reach the cozy bed. Four selectable cat palettes, hand-built tile level, procedural pixel-art world, vector cat sprites, Web Audio synthesised SFX. Vanilla HTML / CSS / JavaScript, no build step.",
    "url": "https://pounce.mike-lee.me/",
    "image": "https://pounce.mike-lee.me/preview.png",
    "inLanguage": "en",
    "applicationCategory": "GameApplication",
    "gamePlatform": ["Web Browser"],
    "operatingSystem": "Any",
    "genre": ["Platformer", "Retro", "Side-scroller"],
    "isAccessibleForFree": true,
    "playMode": "SinglePlayer",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Person",
      "name": "Mike Lee",
      "alternateName": "Whisker Leaks",
      "url": "https://www.linkedin.com/in/mikelee89/"
    },
    "publisher": {
      "@type": "Person",
      "name": "Mike Lee",
      "url": "https://mike-lee.me/"
    },
    "datePublished": "2026-04-26",
    "softwareVersion": "0.2"
  }
  </script>

  <!-- Open Graph -->
  <meta property="og:title" content="POUNCE // A Cat Platformer">
  <meta property="og:description" content="A free browser side-scroller. Play as a cat bounding through a hand-built tile level on the way to a cozy bed.">
  <meta property="og:image" content="https://pounce.mike-lee.me/preview.png">
  <meta property="og:url" content="https://pounce.mike-lee.me/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="pounce">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="POUNCE // A Cat Platformer">
  <meta name="twitter:description" content="A free browser side-scroller. Play as a cat trying to reach the cozy bed.">
  <meta name="twitter:image" content="https://pounce.mike-lee.me/preview.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="frame">
    <div class="bezel-title">
      <span class="bezel-left">
        <a href="https://mike-lee.me/" class="bezel-link"
           target="_blank" rel="noopener noreferrer">HOME</a>
        <a href="readme.html" class="bezel-link">README</a>
        <a href="privacy.html" class="bezel-link">PRIVACY</a>
      </span>
      <span class="bezel-center">POUNCE <span class="dot">&#9632;</span> 2026</span>
      <span class="bezel-right">
        <a href="https://pear.mike-lee.me/" class="bezel-link"
           target="_blank" rel="noopener noreferrer">PEAR</a>
        <a href="https://ski.mike-lee.me/" class="bezel-link"
           target="_blank" rel="noopener noreferrer">SKI</a>
        <a href="https://go.mike-lee.me/" class="bezel-link"
           target="_blank" rel="noopener noreferrer">GO</a>
        <a href="https://github.com/ashtonmorrow/bros" class="bezel-link"
           target="_blank" rel="noopener noreferrer">SOURCE</a>
      </span>
    </div>

    <!-- Top-3 leaderboard strip. Painted from localStorage cache instantly,
         then refreshed from Supabase on load + after each submit. -->
    <div id="leaderboard" class="leaderboard" aria-label="Top three scores"></div>

    <div class="screen-wrap">
      <canvas id="game" width="800" height="480"
              aria-label="Side-scrolling cat platformer"></canvas>

      <!-- Touch controls — hidden by default, shown when body.touch-active.
           Buttons are positioned relative to the screen-wrap so they scale
           with the canvas. Each button writes to the same `keys` object the
           keyboard handlers use, so all input flows through one code path. -->
      <div class="touch-controls" aria-hidden="true">
        <div class="touch-pad">
          <button class="touch-btn touch-left"  type="button" data-key="arrowleft"  aria-label="Move left">◀</button>
          <button class="touch-btn touch-right" type="button" data-key="arrowright" aria-label="Move right">▶</button>
        </div>
        <div class="touch-actions">
          <button class="touch-btn touch-shoot"  type="button" data-key="x"          aria-label="Shoot">⨯</button>
          <button class="touch-btn touch-pounce" type="button" data-key="arrowdown"  aria-label="Down-pounce">▼</button>
          <button class="touch-btn touch-jump"   type="button" data-key=" "          aria-label="Jump">▲</button>
        </div>
      </div>

      <!-- Name-entry overlay. Hidden until the player cracks the top three;
           shown over the win / game-over screen. -->
      <div id="lb-entry" class="lb-entry hidden" role="dialog" aria-label="High score entry">
        <div class="lb-entry-title">NEW HIGH SCORE</div>
        <div class="lb-entry-row">
          <input id="lb-name-input" class="lb-name-input" type="text"
                 maxlength="5" autocomplete="off" spellcheck="false"
                 aria-label="Enter your initials, up to 5 characters">
          <button id="lb-submit" class="lb-submit" type="button">OK</button>
        </div>
        <div class="lb-entry-hint">Up to 5 characters &middot; ENTER to save</div>
      </div>
    </div>

    <p class="controls">
      <strong>Move</strong> A/D &middot;
      <strong>Jump</strong> Space &middot;
      <strong>Pounce</strong> &darr; &middot;
      <strong>Shoot</strong> X &middot;
      <strong>Pause</strong> P
    </p>
  </main>

  <!-- Audio + accessibility — icon-only toggles, slider behind each.
       Labels live in the title attributes (tooltip on hover). -->
  <div class="frame frame-controls">
    <span class="audio-row">
      <button id="music-toggle" class="audio-icon-btn"
              type="button" aria-pressed="true"
              aria-label="Toggle music (M)"
              title="Music (M)">&#9834;</button>
      <input id="music-volume" class="audio-slider" type="range"
             min="0" max="100" step="1" value="100"
             aria-label="Music volume">
    </span>
    <span class="audio-row">
      <button id="sfx-toggle" class="audio-icon-btn"
              type="button" aria-pressed="true"
              aria-label="Toggle sound effects (N)"
              title="FX (N)">&#9678;</button>
      <input id="sfx-volume" class="audio-slider" type="range"
             min="0" max="100" step="1" value="100"
             aria-label="Sound-effects volume">
    </span>
    <button id="contrast-toggle" class="audio-icon-btn"
            type="button" aria-pressed="false"
            aria-label="Toggle high-contrast mode (C)"
            title="High Contrast (C)">&#9728;</button>
  </div>

  <!-- Order matters: shared globals are defined top-down. -->
  <script src="js/sprites.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/level.js"></script>
  <script src="js/game.js"></script>

  <!-- Service worker: PWA installability + offline cache. Skipped on
       file:// because the SW spec requires http(s). -->
  <script>
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
